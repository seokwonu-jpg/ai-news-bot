name: AI 뉴스 데일리 브리핑

on:
  schedule:
    # 매일 09:17 KST / GitHub Actions 정각 혼잡 회피
    - cron: '17 0 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # v2: google-generativeai 제거 후 캐시 강제 갱신
          key: ${{ runner.os }}-pip-v2-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-v2-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen articles cache
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_id }}
          restore-keys: |
            seen-articles-

      - name: Run news bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python newsbot.py daily --fetch-hours 24 --top-n 6

      - name: Save seen articles cache
        if: always()
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_id }}
