name: AI 뉴스 데일리 브리핑

on:
  schedule:
    # 매일 09:17 KST / GitHub Actions 정각 혼잡 회피
    - cron: '17 0 * * *'
  workflow_dispatch:

concurrency:
  group: daily-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # v2: google-generativeai 제거 후 캐시 강제 갱신
          key: ${{ runner.os }}-pip-v2-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-v2-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Capture source health snapshot
        continue-on-error: true
        run: |
          mkdir -p reports
          python source_healthcheck.py --json > reports/source-health.json

      - name: Restore seen articles cache
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_id }}
          restore-keys: |
            seen-articles-

      - name: Validate required secrets
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [[ -z "${SLACK_WEBHOOK_URL}" ]]; then
            echo "::error::Missing required GitHub Actions secret: SLACK_WEBHOOK_URL"
            exit 1
          fi

      - name: Run news bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_API_BASE: ${{ vars.LITELLM_API_BASE }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_CURATOR_PROVIDER: ${{ vars.LLM_CURATOR_PROVIDER }}
          LLM_SUMMARIZER_PROVIDER: ${{ vars.LLM_SUMMARIZER_PROVIDER }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL }}
          LITELLM_CURATOR_MODEL: ${{ vars.LITELLM_CURATOR_MODEL }}
          LITELLM_SUMMARIZER_MODEL: ${{ vars.LITELLM_SUMMARIZER_MODEL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python newsbot.py daily --fetch-hours 24 --top-n 6 --preview-path reports/daily-preview.json

      - name: Upload preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-preview
          path: reports/*.json
          if-no-files-found: ignore

      - name: Save seen articles cache
        if: always()
        uses: actions/cache@v4
        with:
          path: seen_articles.json
          key: seen-articles-${{ github.run_id }}
